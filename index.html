<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laevad - Battleships</title>
    <style>
        :root {
            --bg-grad-1: #020617; --bg-grad-2: #0f172a;
            --grid-line: #1e293b; --ship-color: #38bdf8; 
            --hit-color: #fb7185; --sunk-color: #c084fc; 
            --miss-color: #64748b; --text-color: #f1f5f9; 
            --accent-glow: rgba(56, 189, 248, 0.3);
        }
        body {
            background: radial-gradient(circle at top, var(--bg-grad-2) 0%, var(--bg-grad-1) 100%);
            color: var(--text-color); font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 10px; user-select: none; min-height: 100vh;
        }
        
        .lang-picker { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--grid-line); color: white; padding: 4px 8px; border-radius: 5px; font-size: 0.6rem; cursor: pointer; }
        .lang-btn.active { border-color: var(--ship-color); color: var(--ship-color); }

        h1 { font-weight: 200; margin: 20px 0 5px 0; font-size: 1.8rem; letter-spacing: 5px; text-transform: uppercase; color: var(--ship-color); }
        
        .score-board { display: flex; justify-content: center; gap: 10px; margin: 10px 0; }
        .score-item { background: rgba(30, 41, 59, 0.6); padding: 8px 15px; border-radius: 10px; border: 1px solid var(--grid-line); text-align: center; font-size: 0.65rem; }
        .score-val { color: var(--ship-color); font-weight: bold; font-size: 1.1rem; display: block; }

        .board {
            display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr);
            width: 88vw; max-width: 320px; aspect-ratio: 1 / 1; margin: 10px 0;
            background-color: var(--grid-line); gap: 1px; border: 1px solid var(--grid-line);
            border-radius: 8px; overflow: hidden; box-shadow: 0 0 20px var(--accent-glow);
        }
        .cell { background-color: #0f172a; display: flex; align-items: center; justify-content: center; position: relative; }
        .cell.ship { background-color: rgba(56, 189, 248, 0.15); }
        .cell.hit { background-color: var(--hit-color) !important; }
        .cell.sunk { background-color: var(--sunk-color) !important; }
        .cell.miss::after { content: ""; width: 4px; height: 4px; background-color: var(--miss-color); border-radius: 50%; }

        #setup-controls { display: none; background: rgba(15, 23, 42, 0.95); padding: 15px; border-radius: 15px; width: 88vw; max-width: 320px; border: 1px solid var(--ship-color); text-align: center; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; width: 88vw; max-width: 320px; }
        button.main-btn { background: linear-gradient(135deg, #38bdf8, #2563eb); border: none; color: white; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 13px; text-transform: uppercase; cursor: pointer; }
        button.sec-btn { background: rgba(30, 41, 59, 0.5); border: 1px solid var(--grid-line); color: var(--text-color); padding: 12px; border-radius: 12px; font-size: 12px; cursor: pointer; }

        #message-overlay { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        h2 { font-size: 0.65rem; color: var(--ship-color); opacity: 0.8; letter-spacing: 2px; text-transform: uppercase; margin: 5px 0; }
        
        .footer { margin-top: auto; padding: 20px 0; font-size: 0.6rem; opacity: 0.5; letter-spacing: 1px; text-transform: uppercase; }
        .reset-link { font-size: 9px; opacity: 0.3; margin-top: 10px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="lang-picker">
        <div class="lang-btn" onclick="setLang('et')" id="btn-et">EST</div>
        <div class="lang-btn" onclick="setLang('en')" id="btn-en">ENG</div>
        <div class="lang-btn" onclick="setLang('ru')" id="btn-ru">RUS</div>
    </div>

    <div id="message-overlay">
        <h1 id="win-title">VÕIT!</h1>
        <button class="main-btn" style="width: 200px;" onclick="location.reload()" id="btn-restart">UUS MÄNG</button>
    </div>

    <h1 id="ui-title">LAEVAD</h1>
    
    <div class="score-board">
        <div class="score-item"><span id="ui-wins-label">VÕIDUD</span> <span id="wins" class="score-val">0</span></div>
        <div class="score-item"><span id="ui-losses-label">KAOTUSED</span> <span id="losses" class="score-val" style="color:var(--hit-color)">0</span></div>
    </div>

    <div id="setup-controls">
        <div style="font-size: 0.8rem; margin-bottom: 10px;"><span id="ui-place-label">Aseta</span>: <span id="current-ship-name" style="color:var(--ship-color); font-weight:bold;"></span></div>
        <button class="main-btn" style="width: 100%; margin-bottom: 10px;" onclick="cycleMode()" id="mode-btn"></button>
    </div>

    <div id="turn-info" style="margin: 10px 0; font-weight: bold; color: #fb7185; height: 1.2rem; font-size: 0.8rem;"></div>

    <div id="game-area" style="display:none;">
        <h2 id="ui-enemy-radar">VASTASE RADAR</h2>
        <div id="enemy-board" class="board"></div>
    </div>

    <h2 id="ui-my-fleet">SINU LAEVASTIK</h2>
    <div id="my-board" class="board"></div>

    <div id="menu-btns" class="btn-group">
        <button class="main-btn" onclick="startGame(true)" id="btn-auto">KIIRE LAHING (AUTO)</button>
        <button class="sec-btn" onclick="startSetup()" id="btn-manual">ASETA LAEVAD ISE</button>
    </div>

    <div class="reset-link" onclick="resetAllData()" id="ui-reset">NULLI SKOOR</div>

    <div class="footer">
        <span id="ui-created-by">LOONUD</span>: <strong>OJAAKÜLA</strong>
    </div>

    <script>
        const i18n = {
            et: {
                title: "LAEVAD", wins: "VÕIDUD", losses: "KAOTUSED", auto: "KIIRE LAHING (AUTO)", manual: "ASETA LAEVAD ISE",
                place: "Aseta", turn_user: "SINU KORD", turn_enemy: "VASTANE MÕTLEB...", select_mode: "VALI REŽIIM",
                radar: "VASTASE RADAR", fleet: "SINU LAEVASTIK", restart: "UUS MÄNG", win: "VÕIT!", loss: "KAOTUS",
                hor: "SUUND: HOR", ver: "SUUND: VERT", diag: "SUUND: DIAG", reset: "NULLI SKOOR", created: "LOONUD",
                ships: ["Lennukikandja", "Ristleja", "Allveelaev", "Hävitaja", "Paat"]
            },
            en: {
                title: "BATTLESHIPS", wins: "WINS", losses: "LOSSES", auto: "QUICK BATTLE (AUTO)", manual: "PLACE MANUALLY",
                place: "Place", turn_user: "YOUR TURN", turn_enemy: "ENEMY THINKING...", select_mode: "SELECT MODE",
                radar: "ENEMY RADAR", fleet: "YOUR FLEET", restart: "NEW GAME", win: "VICTORY!", loss: "DEFEAT",
                hor: "DIR: HORIZONTAL", ver: "DIR: VERTICAL", diag: "DIR: DIAGONAL", reset: "RESET SCORE", created: "CREATED BY",
                ships: ["Carrier", "Battleship", "Submarine", "Destroyer", "Patrol Boat"]
            },
            ru: {
                title: "МОРСКОЙ БОЙ", wins: "ПОБЕДЫ", losses: "ПОРАЖЕНИЯ", auto: "БЫСТРЫЙ БОЙ (АВТО)", manual: "РАССТАВИТЬ ВРУЧНУЮ",
                place: "Ставь", turn_user: "ТВОЙ ХОД", turn_enemy: "ВРАГ ДУМАЕТ...", select_mode: "ВЫБЕРИ РЕЖИМ",
                radar: "РАДАР ВРАГА", fleet: "ТВОЙ ФЛОТ", restart: "НОВАЯ ИГРА", win: "ПОБЕДА!", loss: "ПРОИГРЫШ",
                hor: "ГОР", ver: "ВЕРТ", diag: "ДИАГ", reset: "СБРОСИТЬ СЧЕТ", created: "СОЗДАНО",
                ships: ["Авианосец", "Крейсер", "Подлодка", "Эсминец", "Катер"]
            }
        };

        let curLang = localStorage.getItem('ojakula-lang') || 'et';
        let wins = parseInt(localStorage.getItem('ojakula-wins')) || 0;
        let losses = parseInt(localStorage.getItem('ojakula-losses')) || 0;

        const size = 10;
        const shipSizes = [5, 4, 3, 3, 2];
        let enemyShips, myShips, gameOver = false, isPlayerTurn = true, setupMode = false, currentShipIdx = 0, placementMode = 0;

        function updateScoreDisplay() {
            document.getElementById('wins').innerText = wins;
            document.getElementById('losses').innerText = losses;
        }

        function resetAllData() {
            if(confirm("Kas oled kindel?")) {
                wins = 0; losses = 0;
                localStorage.setItem('ojakula-wins', 0);
                localStorage.setItem('ojakula-losses', 0);
                updateScoreDisplay();
            }
        }

        function setLang(lang) {
            curLang = lang;
            localStorage.setItem('ojakula-lang', lang);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
            updateUI();
        }

        function updateUI() {
            const t = i18n[curLang];
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('ui-wins-label').innerText = t.wins;
            document.getElementById('ui-losses-label').innerText = t.losses;
            document.getElementById('btn-auto').innerText = t.auto;
            document.getElementById('btn-manual').innerText = t.manual;
            document.getElementById('ui-place-label').innerText = t.place;
            document.getElementById('ui-enemy-radar').innerText = t.radar;
            document.getElementById('ui-my-fleet').innerText = t.fleet;
            document.getElementById('btn-restart').innerText = t.restart;
            document.getElementById('ui-reset').innerText = t.reset;
            document.getElementById('ui-created-by').innerText = t.created;
            if (!setupMode && !enemyShips) document.getElementById('turn-info').innerText = t.select_mode;
            if (setupMode) updateSetupText();
            const modes = [t.hor, t.ver, t.diag];
            document.getElementById('mode-btn').innerText = modes[placementMode];
        }

        function updateSetupText() {
            const t = i18n[curLang];
            document.getElementById('current-ship-name').innerText = `${t.ships[currentShipIdx]} (${shipSizes[currentShipIdx]})`;
        }

        function cycleMode() {
            placementMode = (placementMode + 1) % 3;
            updateUI();
        }

        function startSetup() {
            setupMode = true; currentShipIdx = 0;
            myShips = { board: Array(100).fill(0), ships: [] };
            document.getElementById('menu-btns').style.display = 'none';
            document.getElementById('setup-controls').style.display = 'block';
            renderEmptyBoard('my-board');
            updateSetupText();
        }

        function renderEmptyBoard(id) {
            const el = document.getElementById(id); el.innerHTML = '';
            for (let i = 0; i < 100; i++) {
                const cell = document.createElement('div'); cell.className = 'cell';
                cell.onclick = () => setupMode && placeShipManual(Math.floor(i/10), i%10);
                el.appendChild(cell);
            }
        }

        function placeShipManual(r, c) {
            const s = shipSizes[currentShipIdx];
            if (canPlace(r, c, s, placementMode, myShips.board)) {
                for (let i = 0; i < s; i++) {
                    let rr = r, cc = c;
                    if (placementMode === 0) cc += i; else if (placementMode === 1) rr += i; else { rr += i; cc += i; }
                    myShips.board[rr * 10 + cc] = 1;
                    document.getElementById('my-board').children[rr * 10 + cc].classList.add('ship');
                }
                currentShipIdx++;
                if (currentShipIdx >= 5) {
                    document.getElementById('setup-controls').style.display = 'none';
                    startGame(false);
                } else updateSetupText();
            }
        }

        function canPlace(r, c, s, mode, board) {
            for (let i = 0; i < s; i++) {
                let rr = r, cc = c;
                if (mode === 0) cc += i; else if (mode === 1) rr += i; else { rr += i; cc += i; }
                if (rr >= 10 || cc >= 10 || board[rr * 10 + cc] === 1) return false;
                for (let x = -1; x <= 1; x++) for (let y = -1; y <= 1; y++) {
                    let nr = rr + x, nc = cc + y;
                    if (nr >= 0 && nr < 10 && nc >= 0 && nc < 10 && board[nr * 10 + nc] === 1) return false;
                }
            }
            return true;
        }

        function startGame(auto) {
            setupMode = false;
            document.getElementById('menu-btns').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            if (auto) { myShips = placeShipsAuto(); renderBoard('my-board', myShips, false); }
            enemyShips = placeShipsAuto();
            renderBoard('enemy-board', enemyShips, true);
            document.getElementById('turn-info').innerText = i18n[curLang].turn_user;
            updateScoreDisplay();
        }

        function placeShipsAuto() {
            const board = Array(100).fill(0); const ships = [];
            shipSizes.forEach(s => {
                let ok = false;
                while (!ok) {
                    const mode = Math.floor(Math.random() * 3);
                    const r = Math.floor(Math.random() * 10), c = Math.floor(Math.random() * 10);
                    if (canPlace(r, c, s, mode, board)) {
                        const coords = [];
                        for (let i = 0; i < s; i++) {
                            let rr = r, cc = c;
                            if (mode === 0) cc += i; else if (mode === 1) rr += i; else { rr += i; cc += i; }
                            board[rr * 10 + cc] = 1; coords.push({r: rr, c: cc, hit: false});
                        }
                        ships.push({coords, sunk: false}); ok = true;
                    }
                }
            });
            return {board, ships};
        }

        function renderBoard(id, data, isEnemy) {
            const el = document.getElementById(id); el.innerHTML = '';
            for (let i = 0; i < 100; i++) {
                const cell = document.createElement('div'); cell.className = 'cell';
                if (!isEnemy && data.board[i] === 1) cell.classList.add('ship');
                cell.onclick = () => isEnemy && !gameOver && isPlayerTurn && userShoot(i, cell, data);
                el.appendChild(cell);
            }
        }

        function userShoot(i, cell, data) {
            if (cell.classList.contains('hit') || cell.classList.contains('miss')) return;
            if (data.board[i] === 1) {
                cell.classList.add('hit');
                checkSinking(Math.floor(i/10), i%10, data, 'enemy-board');
                if (data.ships.every(s => s.sunk)) {
                    wins++; localStorage.setItem('ojakula-wins', wins);
                    showEndGame(true);
                }
            } else {
                cell.classList.add('miss'); isPlayerTurn = false;
                document.getElementById('turn-info').innerText = i18n[curLang].turn_enemy;
                setTimeout(enemyTurn, 800);
            }
        }

        function checkSinking(r, c, data, bId) {
            const s = data.ships.find(ship => ship.coords.some(co => co.r === r && co.c === c));
            s.coords.find(co => co.r === r && co.c === c).hit = true;
            if (s.coords.every(co => co.hit)) {
                s.sunk = true;
                s.coords.forEach(co => {
                    document.getElementById(bId).children[co.r * 10 + co.c].classList.add('sunk');
                    for(let x=-1;x<=1;x++) for(let y=-1;y<=1;y++) {
                        let nr=co.r+x, nc=co.c+y;
                        if(nr>=0 && nr<10 && nc>=0 && nc<10) {
                            let ncEl = document.getElementById(bId).children[nr*10+nc];
                            if(!ncEl.classList.contains('hit')) ncEl.classList.add('miss');
                        }
                    }
                });
            }
        }

        function enemyTurn() {
            let i; const b = document.getElementById('my-board');
            do { i = Math.floor(Math.random() * 100); } while (b.children[i].classList.contains('hit') || b.children[i].classList.contains('miss'));
            if (myShips.board[i] === 1) {
                b.children[i].classList.add('hit');
                checkSinking(Math.floor(i/10), i%10, myShips, 'my-board');
                if (myShips.ships.every(s => s.sunk)) {
                    losses++; localStorage.setItem('ojakula-losses', losses);
                    showEndGame(false);
                } else setTimeout(enemyTurn, 800);
            } else {
                b.children[i].classList.add('miss'); isPlayerTurn = true;
                document.getElementById('turn-info').innerText = i18n[curLang].turn_user;
            }
        }

        function showEndGame(win) {
            gameOver = true;
            updateScoreDisplay();
            document.getElementById('win-title').innerText = win ? i18n[curLang].win : i18n[curLang].loss;
            document.getElementById('message-overlay').style.display = 'flex';
        }

        setLang(curLang);
        updateScoreDisplay();
        renderEmptyBoard('my-board');
    </script>
</body>
</html>
