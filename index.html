<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laevad</title>
    <style>
        :root {
            --bg-color: #0b0e14; --grid-color: #1a202c; --ship-color: #3a86ff;
            --hit-color: #ff006e; --sunk-color: #9d00ff; --miss-color: #4a5568;
            --text-color: #e2e8f0; --cell-bg: #111722; --radar-glow: rgba(58, 134, 255, 0.15);
        }
        body.light-mode {
            --bg-color: #f7fafc; --grid-color: #edf2f7; --ship-color: #0056b3;
            --hit-color: #d80032; --sunk-color: #7000b3; --miss-color: #cbd5e0;
            --text-color: #1a202c; --cell-bg: #ffffff; --radar-glow: rgba(0, 0, 0, 0.05);
        }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 15px; transition: background 0.3s;
            user-select: none; min-height: 100vh;
        }
        
        .header { width: 100%; max-width: 400px; text-align: center; position: relative; margin-bottom: 20px; }
        h1 { font-weight: 200; margin: 10px 0; font-size: 2rem; letter-spacing: 6px; text-transform: uppercase; color: var(--ship-color); }

        .theme-btn { 
            position: absolute; right: 0; top: 50%; transform: translateY(-50%);
            background: none; border: 1px solid var(--text-color); color: var(--text-color); 
            font-size: 10px; padding: 4px 8px; border-radius: 12px; opacity: 0.4; cursor: pointer;
        }

        .stats { font-size: 0.85rem; margin-bottom: 5px; color: var(--ship-color); font-weight: bold; min-height: 1.2rem; }
        #turn-info { font-size: 1rem; height: 1.5rem; color: var(--hit-color); margin-bottom: 15px; font-weight: bold; letter-spacing: 1px; }
        h2 { font-weight: 400; margin: 5px 0; font-size: 0.7rem; letter-spacing: 2px; opacity: 0.5; text-transform: uppercase; }
        
        .board {
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 1px;
            background-color: var(--grid-color); border: 1px solid var(--grid-color);
            width: 85vw; max-width: 320px; aspect-ratio: 1 / 1; margin-bottom: 15px;
            box-shadow: 0 0 15px var(--radar-glow); border-radius: 4px; overflow: hidden;
        }
        .cell { background-color: var(--cell-bg); display: flex; align-items: center; justify-content: center; transition: all 0.3s; position: relative; }
        .cell::before { content: ""; position: absolute; width: 100%; height: 100%; border: 1px solid rgba(58, 134, 255, 0.03); pointer-events: none; }
        
        .my-board .cell.ship { background-color: rgba(58, 134, 255, 0.15); box-shadow: inset 0 0 8px rgba(58, 134, 255, 0.2); }
        .cell.hit { background-color: var(--hit-color) !important; animation: pop 0.4s ease; box-shadow: 0 0 15px var(--hit-color); z-index: 2; }
        .cell.sunk { background-color: var(--sunk-color) !important; transform: scale(0.98); }
        .cell.miss::after { content: ""; width: 6px; height: 6px; background-color: var(--miss-color); border-radius: 50%; opacity: 0.6; }
        
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        button.main-btn { 
            background: linear-gradient(135deg, var(--ship-color), #4cc9f0); border: none; color: white; 
            padding: 14px 45px; border-radius: 30px; font-weight: bold; cursor: pointer;
            font-size: 14px; margin-top: 20px; box-shadow: 0 4px 15px rgba(58, 134, 255, 0.3);
            transition: transform 0.2s;
        }
        button.main-btn:active { transform: scale(0.95); }

        #message-overlay {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(11, 14, 20, 0.98); padding: 40px; border-radius: 20px; text-align: center;
            z-index: 100; border: 1px solid var(--ship-color); width: 85%; max-width: 320px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        footer { margin-top: auto; padding: 25px 0; text-align: center; font-size: 0.7rem; opacity: 0.3; line-height: 1.6; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="message-overlay">
        <h1 id="win-title" style="font-size: 2.5rem; margin-bottom: 10px;">VÕIT!</h1>
        <p id="win-text" style="margin-bottom: 25px;"></p>
        <button class="main-btn" onclick="initGame()">UUS LAHING</button>
    </div>

    <div class="header">
        <h1>LAEVAD</h1>
        <button class="theme-btn" onclick="document.body.classList.toggle('light-mode')">M/V</button>
    </div>

    <div id="turn-info">Valmis lahinguks?</div>

    <div class="stats" id="enemy-stats"></div>
    <h2>VASTASE RADAR</h2>
    <div id="enemy-board" class="board"></div>

    <div class="stats" id="my-stats"></div>
    <h2>SINU LAEVASTIK</h2>
    <div id="my-board" class="board my-board"></div>

    <button class="main-btn" onclick="initGame()">ALUSTA MÄNGU</button>

    <footer>ARENDAJA: PEREKOND OJAKÜLA<br>2026 APRILL</footer>

    <script>
        const size = 10;
        let enemyShips, myShips, gameOver, isPlayerTurn;
        let huntStack = [], audioCtx = null;

        // Joonistame tühjad ruudustikud kohe lehe laadimisel
        function createEmptyBoards() {
            ['enemy-board', 'my-board'].forEach(id => {
                const el = document.getElementById(id);
                el.innerHTML = '';
                for (let i = 0; i < size * size; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    el.appendChild(cell);
                }
            });
        }

        function playSound(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'hit') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'miss') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(80, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'win') {
                [261, 329, 392, 523].forEach((f, i) => {
                    const o = audioCtx.createOscillator(); o.connect(gain);
                    o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
                    o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.3);
                });
            }
        }

        function initGame() {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('message-overlay').style.display = 'none';
            gameOver = false; isPlayerTurn = true; huntStack = [];
            document.getElementById('turn-info').innerText = "Sinu kord tulistada";
            enemyShips = placeAllShips(); myShips = placeAllShips();
            render('enemy-board', enemyShips, true); render('my-board', myShips, false);
            updateStats();
        }

        function placeAllShips() {
            const board = Array(size).fill(0).map(() => Array(size).fill(0));
            const ships = [];
            [5, 4, 3, 3, 2].forEach(s => {
                let ok = false;
                while (!ok) {
                    const vert = Math.random() > 0.5, r = Math.floor(Math.random() * (vert ? size - s : size)), c = Math.floor(Math.random() * (vert ? size : size - s));
                    let free = true;
                    for (let i = -1; i <= s; i++) for (let j = -1; j <= 1; j++) {
                        const rr = vert ? r + i : r + j, cc = vert ? c + j : c + i;
                        if (rr >= 0 && rr < size && cc >= 0 && cc < size && board[rr][cc]) free = false;
                    }
                    if (free) {
                        const coords = [];
                        for (let i = 0; i < s; i++) {
                            const row = vert ? r + i : r, col = vert ? c : c + i;
                            board[row][col] = 1; coords.push({r: row, c: col, hit: false});
                        }
                        ships.push({coords, sunk: false}); ok = true;
                    }
                }
            });
            return {board, ships};
        }

        function render(id, data, isEnemy) {
            const el = document.getElementById(id); el.innerHTML = '';
            for (let r = 0; r < size; r++) for (let c = 0; c < size; c++) {
                const cell = document.createElement('div'); cell.className = 'cell';
                if (data.board[r][c] === 1 && !isEnemy) cell.classList.add('ship');
                cell.onclick = () => isEnemy && userShoot(r, c, cell, data);
                el.appendChild(cell);
            }
        }

        function userShoot(r, c, cell, data) {
            if (!isPlayerTurn || gameOver || cell.classList.contains('hit') || cell.classList.contains('miss') || cell.classList.contains('sunk')) return;
            if (data.board[r][c] === 1) {
                playSound('hit'); handleHit(r, c, data, 'enemy-board');
                if (data.ships.every(s => s.sunk)) { playSound('win'); showEndGame(true); }
            } else {
                playSound('miss'); cell.classList.add('miss'); isPlayerTurn = false;
                document.getElementById('turn-info').innerText = "Vastane sihib..."; setTimeout(enemyTurn, 800);
            }
        }

        function handleHit(r, c, data, boardId) {
            const ship = data.ships.find(s => s.coords.some(co => co.r === r && co.c === c));
            ship.coords.find(co => co.r === r && co.c === c).hit = true;
            document.getElementById(boardId).children[r * size + c].classList.add('hit');
            if (ship.coords.every(co => co.hit)) {
                ship.sunk = true;
                ship.coords.forEach(co => {
                    const sCell = document.getElementById(boardId).children[co.r * size + co.c];
                    sCell.classList.replace('hit', 'sunk');
                    markSurroundings(co.r, co.c, boardId);
                });
            }
            updateStats();
        }

        function markSurroundings(r, c, boardId) {
            for (let i = -1; i <= 1; i++) for (let j = -1; j <= 1; j++) {
                const rr = r + i, cc = c + j;
                if (rr >= 0 && rr < size && cc >= 0 && cc < size) {
                    const cell = document.getElementById(boardId).children[rr * size + cc];
                    if (!cell.classList.contains('hit') && !cell.classList.contains('sunk')) cell.classList.add('miss');
                }
            }
        }

        function enemyTurn() {
            if (gameOver) return;
            let r, c;
            if (huntStack.length > 0) {
                const next = huntStack.pop(); r = next.r; c = next.c;
            } else {
                do { r = Math.floor(Math.random() * size); c = Math.floor(Math.random() * size); } while (isInvalid(r, c));
            }
            const cell = document.getElementById('my-board').children[r * size + c];
            if (myShips.board[r][c] === 1) {
                playSound('hit'); handleHit(r, c, myShips, 'my-board');
                addNeighbors(r, c);
                if (myShips.ships.every(s => s.sunk)) showEndGame(false);
                else setTimeout(enemyTurn, 800);
            } else {
                playSound('miss'); cell.classList.add('miss'); isPlayerTurn = true;
                document.getElementById('turn-info').innerText = "Sinu kord tulistada";
            }
        }

        function isInvalid(r, c) {
            const cell = document.getElementById('my-board').children[r * size + c];
            return cell.classList.contains('hit') || cell.classList.contains('miss') || cell.classList.contains('sunk');
        }

        function addNeighbors(r, c) {
            [{r:1,c:0}, {r:-1,c:0}, {r:0,c:1}, {r:0,c:-1}].forEach(d => {
                const nr = r + d.r, nc = c + d.c;
                if (nr >= 0 && nr < size && nc >= 0 && nc < size && !isInvalid(nr, nc)) huntStack.push({r: nr, c: nc});
            });
        }

        function updateStats() {
            const eSunk = enemyShips.ships.filter(s => s.sunk).length;
            const mSunk = myShips.ships.filter(s => s.sunk).length;
            document.getElementById('enemy-stats').innerText = `VASTASEL UPUTATUD: ${eSunk}/5`;
            document.getElementById('my-stats').innerText = `SUL UPUTATUD: ${mSunk}/5`;
        }

        function showEndGame(win) {
            gameOver = true; const ov = document.getElementById('message-overlay');
            document.getElementById('win-title').innerText = win ? "VÕIT!" : "KAOTUS...";
            document.getElementById('win-title').style.color = win ? "var(--ship-color)" : "var(--hit-color)";
            document.getElementById('win-text').innerText = win ? "Admiral Ojaküla, hiilgav võit!" : "Vastane oli seekord kavalam.";
            ov.style.display = 'block';
        }

        // Käivitame tühjad lauad kohe
        createEmptyBoards();
    </script>
</body>
</html>
