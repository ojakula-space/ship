<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laevad</title>
    <style>
        :root {
            --bg-color: #121212; --grid-color: #2c2c2c; --ship-color: #3a86ff;
            --hit-color: #ff006e; --sunk-color: #9d00ff; --miss-color: #555;
            --text-color: #e0e0e0; --cell-bg: #1a1a1a;
        }
        body.light-mode {
            --bg-color: #f0f0f0; --grid-color: #d1d1d1; --ship-color: #0056b3;
            --hit-color: #d80032; --sunk-color: #7000b3; --miss-color: #999;
            --text-color: #222; --cell-bg: #ffffff;
        }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 10px; transition: background 0.3s;
            user-select: none; min-height: 100vh;
        }
        
        .header { 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            position: relative;
            margin-bottom: 10px;
        }
        
        h1 { 
            font-weight: 300; 
            margin: 10px 0; 
            font-size: 1.8rem; 
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .theme-btn { 
            position: absolute; 
            right: 0; 
            top: 50%; 
            transform: translateY(-50%);
            background: none; 
            border: 1px solid var(--text-color); 
            color: var(--text-color); 
            font-size: 10px; 
            padding: 4px 8px;
            border-radius: 12px;
            opacity: 0.5;
        }

        .stats { font-size: 0.85rem; margin: 5px 0; color: var(--ship-color); font-weight: bold; }
        #turn-info { font-size: 0.9rem; height: 1.2rem; color: var(--hit-color); margin-bottom: 10px; font-weight: bold; }
        h2 { font-weight: 300; margin: 5px 0; font-size: 0.8rem; letter-spacing: 1px; opacity: 0.6; text-transform: uppercase; }
        
        .board {
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 1px;
            background-color: var(--grid-color); border: 1px solid var(--grid-color);
            width: 85vw; max-width: 320px; aspect-ratio: 1 / 1; margin-bottom: 10px;
        }
        .cell { background-color: var(--cell-bg); display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .my-board .cell.ship { background-color: rgba(58, 134, 255, 0.2); }
        .cell.hit { background-color: var(--hit-color) !important; animation: pop 0.3s ease; }
        .cell.sunk { background-color: var(--sunk-color) !important; }
        .cell.miss::after { content: ""; width: 5px; height: 5px; background-color: var(--miss-color); border-radius: 50%; }
        
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        button.main-btn { 
            background: var(--ship-color); border: none; color: white; 
            padding: 12px 40px; border-radius: 8px; font-weight: bold; cursor: pointer;
            font-size: 14px; margin-top: 15px;
        }

        #message-overlay {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); padding: 30px; border-radius: 15px; text-align: center;
            z-index: 100; border: 2px solid var(--ship-color); width: 80%; max-width: 300px;
        }
        footer { margin-top: auto; padding: 20px 0; text-align: center; font-size: 0.75rem; opacity: 0.4; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="message-overlay">
        <h1 id="win-title">VÕIT!</h1>
        <p id="win-text"></p>
        <button class="main-btn" onclick="initGame()">Uus mäng</button>
    </div>

    <div class="header">
        <h1>LAEVAD</h1>
        <button class="theme-btn" onclick="document.body.classList.toggle('light-mode')">M/V</button>
    </div>

    <div id="turn-info">Sinu kord tulistada</div>

    <div class="stats" id="enemy-stats">Vastase laevu: 5/5</div>
    <h2>VASTANE</h2>
    <div id="enemy-board" class="board"></div>

    <div class="stats" id="my-stats">Sinu laevu: 5/5</div>
    <h2>SINA</h2>
    <div id="my-board" class="board my-board"></div>

    <button class="main-btn" onclick="initGame()">ALUSTA MÄNGU</button>

    <footer>Arendaja: Perekond Ojaküla<br>2026 Aprill</footer>

    <script>
        const size = 10;
        let enemyShips, myShips, gameOver, isPlayerTurn;
        let huntStack = [], audioCtx = null;

        function playSound(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'hit') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'miss') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'win') {
                [261, 329, 392, 523].forEach((f, i) => {
                    const o = audioCtx.createOscillator(); o.connect(gain);
                    o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
                    o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.3);
                });
            }
        }

        function initGame() {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('message-overlay').style.display = 'none';
            gameOver = false; isPlayerTurn = true; huntStack = [];
            document.getElementById('turn-info').innerText = "Sinu kord tulistada";
            enemyShips = placeAllShips(); myShips = placeAllShips();
            render('enemy-board', enemyShips, true); render('my-board', myShips, false);
            updateStats();
        }

        function placeAllShips() {
            const board = Array(size).fill(0).map(() => Array(size).fill(0));
            const ships = [];
            [5, 4, 3, 3, 2].forEach(s => {
                let ok = false;
                while (!ok) {
                    const vert = Math.random() > 0.5, r = Math.floor(Math.random() * (vert ? size - s : size)), c = Math.floor(Math.random() * (vert ? size : size - s));
                    let free = true;
                    for (let i = -1; i <= s; i++) for (let j = -1; j <= 1; j++) {
                        const rr = vert ? r + i : r + j, cc = vert ? c + j : c + i;
                        if (rr >= 0 && rr < size && cc >= 0 && cc < size && board[rr][cc]) free = false;
                    }
                    if (free) {
                        const coords = [];
                        for (let i = 0; i < s; i++) {
                            const row = vert ? r + i : r, col = vert ? c : c + i;
                            board[row][col] = 1; coords.push({r: row, c: col, hit: false});
                        }
                        ships.push({coords, sunk: false}); ok = true;
                    }
                }
            });
            return {board, ships};
        }

        function render(id, data, isEnemy) {
            const el = document.getElementById(id); el.innerHTML = '';
            for (let r = 0; r < size; r++) for (let c = 0; c < size; c++) {
                const cell = document.createElement('div'); cell.className = 'cell';
                if (data.board[r][c] === 1 && !isEnemy) cell.classList.add('ship');
                cell.onclick = () => isEnemy && userShoot(r, c, cell, data);
                el.appendChild(cell);
            }
        }

        function userShoot(r, c, cell, data) {
            if (!isPlayerTurn || gameOver || cell.classList.contains('hit') || cell.classList.contains('miss') || cell.classList.contains('sunk')) return;
            if (data.board[r][c] === 1) {
                playSound('hit'); handleHit(r, c, data, 'enemy-board');
                if (data.ships.every(s => s.sunk)) { playSound('win'); showEndGame(true); }
            } else {
                playSound('miss'); cell.classList.add('miss'); isPlayerTurn = false;
                document.getElementById('turn-info').innerText = "Vastane mõtleb..."; setTimeout(enemyTurn, 800);
            }
        }

        function handleHit(r, c, data, boardId) {
            const ship = data.ships.find(s => s.coords.some(co => co.r === r && co.c === c));
            ship.coords.find(co => co.r === r && co.c === c).hit = true;
            document.getElementById(boardId).children[r * size + c].classList.add('hit');
            if (ship.coords.every(co => co.hit)) {
                ship.sunk = true;
                ship.coords.forEach(co => {
                    const sCell = document.getElementById(boardId).children[co.r * size + co.c];
                    sCell.classList.replace('hit', 'sunk');
                    markSurroundings(co.r, co.c, boardId);
                });
            }
            updateStats();
        }

        function markSurroundings(r, c, boardId) {
            for (let i = -1; i <= 1; i++) for (let j = -1; j <= 1; j++) {
                const rr = r + i, cc = c + j;
                if (rr >= 0 && rr < size && cc >= 0 && cc < size) {
                    const cell = document.getElementById(boardId).children[rr * size + cc];
                    if (!cell.classList.contains('hit') && !cell.classList.contains('sunk')) cell.classList.add('miss');
                }
            }
        }

        function enemyTurn() {
            if (gameOver) return;
            let r, c;
            if (huntStack.length > 0) {
                const next = huntStack.pop(); r = next.r; c = next.c;
            } else {
                do { r = Math.floor(Math.random() * size); c = Math.floor(Math.random() * size); } while (isInvalid(r, c));
            }
            const cell = document.getElementById('my-board').children[r * size + c];
            if (myShips.board[r][c] === 1) {
                playSound('hit'); handleHit(r, c, myShips, 'my-board');
                addNeighbors(r, c);
                if (myShips.ships.every(s => s.sunk)) showEndGame(false);
                else setTimeout(enemyTurn, 800);
            } else {
                playSound('miss'); cell.classList.add('miss'); isPlayerTurn = true;
                document.getElementById('turn-info').innerText = "Sinu kord tulistada";
            }
        }

        function isInvalid(r, c) {
            const cell = document.getElementById('my-board').children[r * size + c];
            return cell.classList.contains('hit') || cell.classList.contains('miss') || cell.classList.contains('sunk');
        }

        function addNeighbors(r, c) {
            [{r:1,c:0}, {r:-1,c:0}, {r:0,c:1}, {r:0,c:-1}].forEach(d => {
                const nr = r + d.r, nc = c + d.c;
                if (nr >= 0 && nr < size && nc >= 0 && nc < size && !isInvalid(nr, nc)) huntStack.push({r: nr, c: nc});
            });
        }

        function updateStats() {
            const eSunk = enemyShips.ships.filter(s => s.sunk).length;
            const mSunk = myShips.ships.filter(s => s.sunk).length;
            document.getElementById('enemy-stats').innerText = `Vastasel
