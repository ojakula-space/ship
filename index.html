<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laevad</title>
    <style>
        :root {
            --bg-grad-1: #020617; /* Sügavmust-sinine */
            --bg-grad-2: #0f172a;
            --grid-line: #1e293b; /* Väga peen ja tume joon */
            --ship-color: #38bdf8; 
            --hit-color: #fb7185; 
            --sunk-color: #c084fc; 
            --miss-color: #64748b;
            --text-color: #f1f5f9; 
            --cell-bg: #0f172a; 
            --accent-glow: rgba(56, 189, 248, 0.25);
        }
        body {
            background: radial-gradient(circle at top, var(--bg-grad-2) 0%, var(--bg-grad-1) 100%);
            color: var(--text-color); font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 10px; user-select: none; min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        
        .header { width: 100%; max-width: 400px; text-align: center; margin-bottom: 5px; }
        h1 { font-weight: 200; margin: 15px 0 5px 0; font-size: 2rem; letter-spacing: 6px; text-transform: uppercase; color: var(--ship-color); text-shadow: 0 0 15px var(--accent-glow); }

        .score-board { display: flex; justify-content: center; gap: 20px; font-size: 0.7rem; margin: 10px 0; }
        .score-item { background: rgba(30, 41, 59, 0.5); padding: 8px 15px; border-radius: 10px; border: 1px solid var(--grid-line); }
        .score-val { color: var(--ship-color); font-weight: bold; font-size: 1.1rem; margin-left: 5px; }
        
        #turn-info { font-size: 0.9rem; height: 1.2rem; color: #fb7185; margin: 10px 0; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        h2 { font-weight: 400; margin: 8px 0; font-size: 0.65rem; letter-spacing: 2px; color: var(--miss-color); text-transform: uppercase; }
        
        .board {
            display: grid; grid-template-columns: repeat(10, 1fr);
            width: 85vw; max-width: 320px; aspect-ratio: 1 / 1; margin-bottom: 20px;
            background-color: var(--grid-line); border: 1px solid var(--grid-line);
            border-radius: 6px; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), 0 0 10px var(--accent-glow);
        }
        .cell { 
            background-color: var(--cell-bg); 
            display: flex; align-items: center; justify-content: center; 
            position: relative; border: 0.1px solid rgba(255,255,255,0.02);
        }
        .cell.ship { background-color: rgba(56, 189, 248, 0.15); box-shadow: inset 0 0 8px rgba(56, 189, 248, 0.2); }
        .cell.hit { background-color: var(--hit-color) !important; animation: hit-flash 0.4s ease; }
        .cell.sunk { background-color: var(--sunk-color) !important; opacity: 0.8; }
        .cell.miss::after { content: ""; width: 4px; height: 4px; background-color: var(--miss-color); border-radius: 50%; }
        
        @keyframes hit-flash { 0% { filter: brightness(3); } 100% { filter: brightness(1); } }

        #setup-controls { 
            display: none; background: rgba(15, 23, 42, 0.9); padding: 15px; 
            border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--ship-color);
            text-align: center; width: 85vw; max-width: 320px;
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 85vw; max-width: 320px; }
        button.main-btn { 
            background: linear-gradient(135deg, #38bdf8, #2563eb); border: none; color: white; 
            padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer;
            font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        button.sec-btn { background: rgba(30, 41, 59, 0.5); border: 1px solid var(--grid-line); color: var(--text-color); padding: 12px; border-radius: 12px; font-size: 12px; cursor: pointer; }

        #message-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .reset-score { font-size: 9px; opacity: 0.3; margin-top: 30px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="message-overlay">
        <h1 id="win-title" style="font-size: 3rem;">VÕIT!</h1>
        <p id="win-text" style="margin-bottom: 30px;"></p>
        <button class="main-btn" style="width: 200px;" onclick="location.reload()">UUS MÄNG</button>
    </div>

    <div class="header">
        <h1>LAEVAD</h1>
        <div class="score-board">
            <div class="score-item">VÕIDUD <span id="wins" class="score-val">0</span></div>
            <div class="score-item">KAOTUSED <span id="losses" class="score-val" style="color:var(--hit-color)">0</span></div>
        </div>
    </div>

    <div id="setup-controls">
        <div style="font-size: 0.8rem; margin-bottom: 10px; color: var(--ship-color);">Paiguta: <span id="current-ship-name" style="font-weight:bold;">Lennukikandja (5)</span></div>
        <button class="main-btn" style="width: 100%; margin-bottom: 10px;" onclick="toggleRotation()" id="rot-btn">PÖÖRA LAEVA</button>
        <div style="font-size: 0.7rem; opacity: 0.7;">Klikka laual, et laev asetada</div>
    </div>

    <div id="turn-info">Vali režiim</div>

    <div id="game-area" style="display:none;">
        <h2>VASTASE RADAR</h2>
        <div id="enemy-board" class="board"></div>
    </div>

    <h2 id="my-label">SINU LAEVASTIK</h2>
    <div id="my-board" class="board"></div>

    <div id="menu-btns" class="btn-group">
        <button class="main-btn" onclick="startGame(true)">KIIRE LAHING (AUTO)</button>
        <button class="sec-btn" onclick="startSetup()">ASETA LAEVAD ISE</button>
    </div>

    <div class="reset-score" onclick="resetScore()">NULLI SKOOR</div>

    <script>
        const size = 10;
        const shipSizes = [5, 4, 3, 3, 2];
        let enemyShips, myShips, gameOver, isPlayerTurn;
        let setupMode = false, currentShipIdx = 0, isVertical = false;
        let wins = parseInt(localStorage.getItem('ojakula-wins')) || 0;
        let losses = parseInt(localStorage.getItem('ojakula-losses')) || 0;

        function updateScoreDisplay() {
            document.getElementById('wins').innerText = wins;
            document.getElementById('losses').innerText = losses;
        }

        function resetScore() {
            if(confirm("Nulli skoor?")) {
                wins = 0; losses = 0;
                localStorage.setItem('ojakula-wins', 0); localStorage.setItem('ojakula-losses', 0);
                updateScoreDisplay();
            }
        }

        function startSetup() {
            setupMode = true;
            currentShipIdx = 0;
            myShips = { board: Array(size).fill(0).map(() => Array(size).fill(0)), ships: [] };
            document.getElementById('menu-btns').style.display = 'none';
            document.getElementById('setup-controls').style.display = 'block';
            document.getElementById('turn-info').innerText = "Ettevalmistus";
            renderSetupBoard();
        }

        function toggleRotation() {
            isVertical = !isVertical;
            document.getElementById('rot-btn').innerText = isVertical ? "SUUND: VERTIKAALNE" : "SUUND: HORISONTAALNE";
        }

        function renderSetupBoard() {
            const el = document.getElementById('my-board');
            el.innerHTML = '';
            for (let r = 0; r < size; r++) for (let c = 0; c < size; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (myShips.board[r][c] === 1) cell.classList.add('ship');
                cell.onclick = () => placeShipManual(r, c);
                el.appendChild(cell);
            }
        }

        function placeShipManual(r, c) {
            const s = shipSizes[currentShipIdx];
            if (canPlace(r, c, s, isVertical, myShips.board)) {
                const coords = [];
                for (let i = 0; i < s; i++) {
                    const rr = isVertical ? r + i : r, cc = isVertical ? c : c + i;
                    myShips.board[rr][cc] = 1;
                    coords.push({r: rr, c: cc, hit: false});
                }
                myShips.ships.push({coords, sunk: false});
                currentShipIdx++;
                if (currentShipIdx >= shipSizes.length) {
                    setupMode = false;
                    document.getElementById('setup-controls').style.display = 'none';
                    startGame(false);
                } else {
                    document.getElementById('current-ship-name').innerText = `Laev (${shipSizes[currentShipIdx]})`;
                    renderSetupBoard();
                }
            } else if (navigator.vibrate) navigator.vibrate(50);
        }

        function canPlace(r, c, s, vert, board) {
            if (vert && r + s > size) return false;
            if (!vert && c + s > size) return false;
            for (let i = -1; i <= s; i++) {
                for (let j = -1; j <= 1; j++) {
                    const rr = vert ? r + i : r + j;
                    const cc = vert ? c + j : c + i;
                    if (rr >= 0 && rr < size && cc >= 0 && cc < size && board[rr][cc]) return false;
                }
            }
            return true;
        }

        function startGame(auto) {
            document.getElementById('menu-btns').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            gameOver = false; isPlayerTurn = true;
            enemyShips = placeShipsAuto();
            if (auto) myShips = placeShipsAuto();
            
            render('enemy-board', enemyShips, true);
            render('my-board', myShips, false);
            document.getElementById('turn-info').innerText = "Sinu kord";
            updateScoreDisplay();
        }

        function placeShipsAuto() {
            const board = Array(size).fill(0).map(() => Array(size).fill(0));
            const ships = [];
            shipSizes.forEach(s => {
                let ok = false;
                while (!ok) {
                    const vert = Math.random() > 0.5;
                    const r = Math.floor(Math.random() * size), c = Math.floor(Math.random() * size);
                    if (canPlace(r, c, s, vert, board)) {
                        const coords = [];
                        for (let i = 0; i < s; i++) {
                            const rr = vert ? r + i : r, cc = vert ? c : c + i;
                            board[rr][cc] = 1; coords.push({r: rr, c: cc, hit: false});
                        }
                        ships.push({coords, sunk: false}); ok = true;
                    }
                }
            });
            return {board, ships};
        }

        function render(id, data, isEnemy) {
            const el = document.getElementById(id); el.innerHTML = '';
            for (let r = 0; r < size; r++) for (let c = 0; c < size; c++) {
                const cell = document.createElement('div'); cell.className = 'cell';
                if (data.board[r][c] === 1 && !isEnemy) cell.classList.add('ship');
                cell.onclick = () => isEnemy && userShoot(r, c, cell, data);
                el.appendChild(cell);
            }
        }

        function userShoot(r, c, cell, data) {
            if (!isPlayerTurn || gameOver || cell.classList.contains('hit') || cell.classList.contains('miss')) return;
            if (data.board[r][c] === 1) {
                handleHit(r, c, data, 'enemy-board');
                if (data.ships.every(s => s.sunk)) { wins++; localStorage.setItem('ojakula-wins', wins); showEndGame(true); }
            } else {
                cell.classList.add('miss'); isPlayerTurn = false;
                document.getElementById('turn-info').innerText = "Vastane mõtleb..."; setTimeout(enemyTurn, 600);
            }
        }

        function handleHit(r, c, data, boardId) {
            const ship = data.ships.find(s => s.coords.some(co => co.r === r && co.c === c));
            ship.coords.find(co => co.r === r && co.c === c).hit = true;
            document.getElementById(boardId).children[r * size + c].classList.add('hit');
            
            if (ship.coords.every(co => co.hit)) {
                ship.sunk = true;
                ship.coords.forEach(co => {
                    document.getElementById(boardId).children[co.r * size + co.c].classList.replace('hit', 'sunk');
                    markSurroundings(co.r, co.c, boardId);
                });
            }
        }

        function markSurroundings(r, c, boardId) {
            for (let i = -1; i <= 1; i++) for (let j = -1; j <= 1; j++) {
                const rr = r + i, cc = c + j;
                if (rr >= 0 && rr < size && cc >= 0 && cc < size) {
                    const cell = document.getElementById(boardId).children[rr * size + cc];
                    if (!cell.classList.contains('hit') && !cell.classList.contains('sunk')) {
                        cell.classList.add('miss');
                    }
                }
            }
        }

        function enemyTurn() {
            if (gameOver) return;
            let r, c;
            do { r = Math.floor(Math.random() * size); c = Math.floor(Math.random() * size); } 
            while (document.getElementById('my-board').children[r * size + c].classList.contains('hit') || 
                   document.getElementById('my-board').children[r * size + c].classList.contains('miss') ||
                   document.getElementById('my-board').children[r * size + c].classList.contains('sunk'));
            
            if (myShips.board[r][c] === 1) {
                handleHit(r, c, myShips, 'my-board');
                if (myShips.ships.every(s => s.sunk)) { losses++; localStorage.setItem('ojakula-losses', losses); showEndGame(false); }
                else setTimeout(enemyTurn, 600);
            } else {
                document.getElementById('my-board').children[r * size + c].classList.add('miss');
                isPlayerTurn = true; document.getElementById('turn-info').innerText = "Sinu kord!";
            }
        }

        function showEndGame(win) {
            gameOver = true;
            const ov = document.getElementById('message-overlay');
            document.getElementById('win-title').innerText = win ? "VÕIT!" : "KAOTUS";
            document.getElementById('win-text').innerText = win ? "Hävitustöö on lõpule viidud." : "Sinu laevastik on põhjas.";
            ov.style.display = 'flex';
        }

        updateScoreDisplay();
        render('my-board', {board: Array(size).fill(0).map(()=>Array(size).fill(0))}, false);
    </script>
</body>
</html>
